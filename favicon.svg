<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Face base -->
  <ellipse cx="50" cy="48" rx="34" ry="38" fill="#1a1a1a" stroke="#f85149" stroke-width="2"/>
  <!-- Forehead highlight -->
  <ellipse cx="50" cy="28" rx="22" ry="10" fill="#2a2a2a"/>
  <!-- Left eye -->
  <ellipse cx="36" cy="42" rx="9" ry="6" fill="#0a0a0a" stroke="#f85149" stroke-width="1.5"/>
  <ellipse cx="36" cy="42" rx="5" ry="3.5" fill="#f85149" opacity="0.8"/>
  <!-- Right eye -->
  <ellipse cx="64" cy="42" rx="9" ry="6" fill="#0a0a0a" stroke="#f85149" stroke-width="1.5"/>
  <ellipse cx="64" cy="42" rx="5" ry="3.5" fill="#f85149" opacity="0.8"/>
  <!-- Nose -->
  <path d="M50 50 L45 62 L55 62 Z" fill="#2a2a2a" stroke="#f85149" stroke-width="1"/>
  <!-- Smirk mouth -->
  <path d="M34 70 Q50 80 66 70" fill="none" stroke="#f85149" stroke-width="2" stroke-linecap="round"/>
  <path d="M34 70 Q38 74 42 72" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M66 70 Q62 74 58 72" fill="none" stroke="#f85149" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chin dimple -->
  <ellipse cx="50" cy="82" rx="5" ry="3" fill="#2a2a2a"/>
  <!-- Eyebrow lines (angled for menacing look) -->
  <path d="M27 35 L45 38" stroke="#f85149" stroke-width="2" stroke-linecap="round"/>
  <path d="M73 35 L55 38" stroke="#f85149" stroke-width="2" stroke-linecap="round"/>
</svg>